<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title data-key="ui.siteTitle">Шахматный Анализатор</title>
  <script src="templates/translations.js"></script>
</head>
<body>
  <header>
    <h1 data-key="ui.siteTitle">Шахматный Анализатор</h1>
    <div>
      <button class="lang-btn" data-lang="ru" data-key="ui.language">Язык</button>
      <button class="lang-btn" data-lang="en">English</button>
      <button class="lang-btn" data-lang="kk">Қазақша</button>
    </div>
  </header>
  <main>
    <button data-key="ui.play">Играть</button>
    <button data-key="ui.stop">Стоп</button>
    <div>
      <span data-key="chess.move">Ход</span>
      <span data-key="chess.check">Шах</span>
      <span data-key="chess.mate">Мат</span>
    </div>
    <div>
      <label data-key="ui.comment">Комментарий к ходу</label>
      <input type="text" placeholder="Комментарий к ходу" data-key="ui.comment">
    </div>
    <section>
      <h2 data-key="ui.aiAnalysis">Анализ ИИ</h2>
      <div id="ai-comment"></div>
    </section>
  </main>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      i18n.initI18n();
      i18n.setupLanguageSwitcher();
      const lang = i18n.getLanguage();
      document.getElementById('ai-comment').textContent = i18n.translateDynamic('ai.thinking', lang);
    });
  </script>
</body>
</html>
